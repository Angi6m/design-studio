<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة الطلبات | Design Studio</title>
    <link rel="stylesheet" href="Style.CSS">
    <style>
        body { font-family: sans-serif; background-color: #fcf8f5; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #d4a373; text-align: center; margin-bottom: 30px; }
        .orders-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 16px; }
        .orders-table th, .orders-table td { border: 1px solid #f1eae4; padding: 12px 15px; text-align: right; }
        .orders-table th { background-color: #f7ede2; color: #5c4d3c; font-weight: bold; }
        .orders-table tr:nth-child(even) { background-color: #fffbf7; }
        .orders-table tr:hover { background-color: #fdf5ed; }
        .loading { text-align: center; font-size: 18px; color: #888; padding: 20px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>📦 لوحة إدارة طلبات العملاء</h1>
        
        <div id="loadingMessage" class="loading">جاري تحميل الطلبات من السيرفر... 🔄</div>
        
        <table class="orders-table" id="ordersTable" style="display: none;">
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>رقم الهاتف / الواتساب</th>
                    <th>الصورة المرفقة</th> <th>تفاصيل الرسالة (الطلب)</th>
                    <th>وقت الإرسال</th>
                    <th>إجراءات</th> 
                </tr>
            </thead>
            <tbody id="ordersContainer">
                </tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
